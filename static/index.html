<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库问答</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">RAG 知识库问答</h2>
            </div>
            <div class="sidebar-content">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>新建对话</span>
                </button>
                <div class="chat-history-section">
                    <div class="history-header"><span>近期对话</span></div>
                    <input type="search" id="historySearchInput" class="history-search-input" placeholder="搜索历史">
                    <div class="chat-history-list" id="chatHistoryList"></div>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="chat-container">
                <div class="welcome-greeting" id="welcomeGreeting">
                    <p>你好！我是知识库问答助手</p>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <div class="input-group-wrapper">
                        <div class="input-wrapper">
                            <input type="text" id="messageInput" placeholder="输入你的问题..." maxlength="1000" class="message-input">
                            <div class="input-bottom-bar">
                                <div class="tools-btn-wrapper">
                                    <button class="tools-btn" id="toolsBtn" title="上传文件">
                                        <svg viewBox="0 0 24 24" fill="none">
                                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="right-actions">
                                    <div class="mode-selector-wrapper">
                                        <button class="mode-selector-btn" id="modeSelectorBtn">
                                            <span id="currentModeText">快速</span>
                                            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none">
                                                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                        </button>
                                        <div class="mode-dropdown" id="modeDropdown">
                                            <div class="dropdown-item active" data-mode="quick"><span>快速</span></div>
                                            <div class="dropdown-item" data-mode="stream"><span>流式</span></div>
                                        </div>
                                    </div>
                                    <button class="send-btn-circle" id="sendButton" title="发送">
                                        <svg viewBox="0 0 24 24" fill="none">
                                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept=".txt,.md,.markdown,.csv,.html,.htm,.json" style="display: none;">
                </div>
            </div>
        </main>
        <aside class="management-panel">
            <section class="ops-section">
                <div class="ops-section-header">
                    <span>知识空间</span>
                    <button type="button" class="ops-icon-btn" id="refreshSpacesBtn" title="刷新知识空间">↻</button>
                </div>
                <select id="spaceSelector" class="space-selector">
                    <option value="default">default</option>
                </select>
                <form id="createSpaceForm" class="space-form">
                    <input id="newSpaceIdInput" type="text" placeholder="space id">
                    <input id="newSpaceNameInput" type="text" placeholder="显示名称">
                    <button type="submit">创建</button>
                </form>
            </section>
            <section class="ops-section">
                <div class="ops-section-header">
                    <span>文档</span>
                    <button type="button" class="ops-icon-btn" id="refreshDocumentsBtn" title="刷新文档">↻</button>
                </div>
                <div id="documentList" class="ops-list">暂无文档</div>
            </section>
            <section class="ops-section">
                <div class="ops-section-header">
                    <span>索引任务</span>
                    <button type="button" class="ops-icon-btn" id="refreshIndexJobsBtn" title="刷新任务">↻</button>
                </div>
                <div id="indexJobList" class="ops-list">暂无索引任务</div>
            </section>
            <section class="ops-section">
                <div class="ops-section-header">
                    <span>检索审计</span>
                    <button type="button" class="ops-icon-btn" id="refreshAuditsBtn" title="刷新审计">↻</button>
                </div>
                <div id="auditList" class="ops-list">暂无审计记录</div>
            </section>
            <div id="managementStatus" class="management-status"></div>
        </aside>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
